<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Nature</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2e8b57;
        }

        .login-box input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: #2e8b57;
            color: white;
            border: none;
            cursor: pointer;
        }

        .login-box button:hover {
            background-color: #246b45;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <form>
        <input type="text" placeholder="Name" required>
        <input type="tel" placeholder="Phone Number" required>
        <input type="text" placeholder="Nature Interest" required>
        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
